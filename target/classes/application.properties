# =============================================
# ABDM Sandbox Configuration
# =============================================
server.port=7070
spring.application.name=abdm-integration

# =============================================
# ABDM Credentials  (pass secret via env var)
# =============================================
abdm.client-id=SBXID_033658
abdm.client-secret=7887d7b7-de3e-4956-87e0-daf76fea7bd9
abdm.x-cm-id=sbx

# =============================================
# ABDM Base URLs  (Sandbox)
# =============================================
abdm.gateway-base-url=https://dev.abdm.gov.in
abdm.abha-base-url=https://abhasbx.abdm.gov.in/abha/api
abdm.phr-base-url=https://abhasbx.abdm.gov.in/abha/api/v3/phr/web

# =============================================
# ABDM Endpoint Paths
# =============================================
abdm.endpoint.session=/api/hiecm/gateway/v3/sessions
abdm.endpoint.bridge-register=/devservice/v1/bridges

# M1 - ABHA Creation
abdm.endpoint.public-cert=/v3/profile/public/certificate
abdm.endpoint.enrol-otp=/v3/enrollment/request/otp
abdm.endpoint.enrol-by-aadhaar=/v3/enrollment/enrol/byAadhaar
abdm.endpoint.enrol-verify-abdm=/v3/enrollment/auth/byAbdm
abdm.endpoint.enrol-suggestion=/v3/enrollment/enrol/suggestion
abdm.endpoint.enrol-abha-address=/v3/enrollment/enrol/abha-address

# M1 - ABHA Login
abdm.endpoint.login-otp=/v3/profile/login/request/otp
abdm.endpoint.login-verify=/v3/profile/login/verify
abdm.endpoint.login-verify-user=/v3/profile/login/verify/user

# M1 - ABHA Profile
abdm.endpoint.profile=/v3/profile/account
abdm.endpoint.profile-qr=/v3/profile/account/qrCode
abdm.endpoint.profile-card=/v3/profile/account/abha-card

# M2 - HIP Linking
abdm.endpoint.link-init=/api/hiecm/gateway/v3/links/link/init
abdm.endpoint.link-confirm=/api/hiecm/gateway/v3/links/link/confirm
abdm.endpoint.add-care-context=/api/hiecm/gateway/v3/links/addCareContext
abdm.endpoint.notify-care-context=/api/hiecm/gateway/v3/links/context/notify

# M2 - HIU Consent + Data
abdm.endpoint.consent-init=/api/hiecm/gateway/v3/consent-requests/init
abdm.endpoint.health-info-request=/api/hiecm/gateway/v3/health-information/cm/request

# =============================================
# Logging
# =============================================
logging.level.com.nhcx.abdm=DEBUG
logging.level.okhttp3=INFO

# =============================================
# Swagger
# =============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
